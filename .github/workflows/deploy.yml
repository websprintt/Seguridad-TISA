name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js (Node 24)
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Actualizado para evitar el aviso de obsolescencia
          cache: 'npm'

      - name: Instalar dependencias
        # Usamos --legacy-peer-deps por si React 19 tiene conflictos con librerías antiguas
        run: npm install --legacy-peer-deps 

      - name: Construir aplicación (Build)
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
